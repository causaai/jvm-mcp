# Quarkus Configuration
quarkus.application.name=jvm-jmx-mcp
quarkus.http.port=8080

# MCP Server Configuration
quarkus.mcp.server.name=JVM Observability MCP Server
quarkus.mcp.server.version=1.0.0

# Prometheus Data Source Configuration
prometheus.url=${PROMETHEUS_URL:http://localhost:9091}
prometheus.job=${PROMETHEUS_JOB:liberty-jmx}
prometheus.timeout=${PROMETHEUS_TIMEOUT:30s}

# Prometheus REST Client Configuration
quarkus.rest-client.prometheus.url=${prometheus.url}
quarkus.rest-client.prometheus.scope=jakarta.inject.Singleton

# Data Source Configuration
datasource.type=${DATASOURCE_TYPE:prometheus}
datasource.enabled=${DATASOURCE_ENABLED:true}

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.kruize".level=DEBUG

